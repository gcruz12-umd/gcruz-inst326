<svg width="500" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="250" y="25" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">The Strategy Pattern</text>

  <!-- ExpenseReport class box -->
  <rect x="30" y="70" width="190" height="120" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="5"/>
  <text x="125" y="95" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle" font-weight="bold">ExpenseReport</text>
  <line x1="40" y1="105" x2="210" y2="105" stroke="#ebf5fb" stroke-width="1"/>
  <text x="125" y="125" font-family="monospace" font-size="11" fill="#ebf5fb" text-anchor="middle">expenses: list</text>
  <text x="125" y="145" font-family="monospace" font-size="11" fill="#ebf5fb" text-anchor="middle">add(expense)</text>
  <text x="125" y="165" font-family="monospace" font-size="12" fill="#d4efdf" text-anchor="middle" font-weight="bold">analyze(strategy)</text>
  <text x="125" y="205" font-family="Arial, sans-serif" font-size="12" fill="#2980b9" text-anchor="middle">Doesn't change</text>

  <!-- Arrow cluster -->
  <line x1="220" y1="108" x2="290" y2="88" stroke="#9b59b6" stroke-width="2"/>
  <polygon points="290,88 280,86 282,96" fill="#9b59b6"/>

  <line x1="220" y1="130" x2="290" y2="150" stroke="#9b59b6" stroke-width="2"/>
  <polygon points="290,150 280,144 282,154" fill="#9b59b6"/>

  <line x1="220" y1="150" x2="290" y2="218" stroke="#9b59b6" stroke-width="2"/>
  <polygon points="290,218 280,213 283,222" fill="#9b59b6"/>

  <text x="255" y="55" font-family="Arial, sans-serif" font-size="11" fill="#9b59b6" text-anchor="middle" font-style="italic">pass any</text>
  <text x="255" y="67" font-family="Arial, sans-serif" font-size="11" fill="#9b59b6" text-anchor="middle" font-style="italic">strategy</text>

  <!-- Strategy function boxes -->
  <rect x="295" y="65" width="185" height="40" fill="#27ae60" stroke="#1e8449" stroke-width="2" rx="5"/>
  <text x="387" y="90" font-family="monospace" font-size="11" fill="white" text-anchor="middle">total_by_category()</text>

  <rect x="295" y="130" width="185" height="40" fill="#f39c12" stroke="#d68910" stroke-width="2" rx="5"/>
  <text x="387" y="155" font-family="monospace" font-size="11" fill="white" text-anchor="middle">average_expense()</text>

  <rect x="295" y="198" width="185" height="40" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="5"/>
  <text x="387" y="223" font-family="monospace" font-size="11" fill="white" text-anchor="middle">your_new_analysis()</text>

  <!-- Labels -->
  <text x="387" y="258" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle">Add new strategies anytime</text>
  <text x="387" y="273" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle">without changing the class</text>
</svg>
