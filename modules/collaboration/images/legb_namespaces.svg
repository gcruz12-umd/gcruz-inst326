<svg width="500" height="320" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="250" y="25" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">LEGB Rule: Namespace Search Order</text>
  
  <!-- Built-in (outermost) -->
  <rect x="30" y="50" width="440" height="250" fill="#e8daef" stroke="#9b59b6" stroke-width="3" rx="10"/>
  <text x="250" y="75" font-family="Arial, sans-serif" font-size="14" fill="#8e44ad" text-anchor="middle" font-weight="bold">B - Built-in</text>
  <text x="250" y="92" font-family="monospace" font-size="11" fill="#9b59b6" text-anchor="middle">print(), len(), range(), str()...</text>
  
  <!-- Global -->
  <rect x="60" y="105" width="380" height="180" fill="#ebf5fb" stroke="#3498db" stroke-width="3" rx="10"/>
  <text x="250" y="130" font-family="Arial, sans-serif" font-size="14" fill="#2980b9" text-anchor="middle" font-weight="bold">G - Global (Module)</text>
  <text x="250" y="147" font-family="monospace" font-size="11" fill="#3498db" text-anchor="middle">Variables at module level</text>
  
  <!-- Enclosing -->
  <rect x="90" y="160" width="320" height="110" fill="#fef9e7" stroke="#f39c12" stroke-width="3" rx="10"/>
  <text x="250" y="185" font-family="Arial, sans-serif" font-size="14" fill="#d68910" text-anchor="middle" font-weight="bold">E - Enclosing</text>
  <text x="250" y="202" font-family="monospace" font-size="11" fill="#f39c12" text-anchor="middle">Outer function scope</text>
  
  <!-- Local (innermost) -->
  <rect x="120" y="215" width="260" height="45" fill="#d5f5e3" stroke="#27ae60" stroke-width="3" rx="10"/>
  <text x="250" y="238" font-family="Arial, sans-serif" font-size="14" fill="#1e8449" text-anchor="middle" font-weight="bold">L - Local</text>
  <text x="250" y="253" font-family="monospace" font-size="11" fill="#27ae60" text-anchor="middle">Inside current function</text>
  
  <!-- Search arrow -->
  <text x="480" y="170" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" text-anchor="start" font-weight="bold">Search</text>
  <text x="480" y="185" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" text-anchor="start" font-weight="bold">Order</text>
  <line x1="500" y1="195" x2="500" y2="240" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Numbers showing search order -->
  <circle cx="135" cy="238" r="12" fill="#e74c3c"/>
  <text x="135" y="243" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">1</text>
  
  <circle cx="105" cy="185" r="12" fill="#e74c3c"/>
  <text x="105" y="190" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">2</text>
  
  <circle cx="75" cy="130" r="12" fill="#e74c3c"/>
  <text x="75" y="135" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">3</text>
  
  <circle cx="45" cy="75" r="12" fill="#e74c3c"/>
  <text x="45" y="80" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">4</text>
  
  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>
