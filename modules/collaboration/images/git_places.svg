<svg width="650" height="380" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="325" y="25" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">The Four Git "Places"</text>
  
  <!-- Remote Repository (cloud) -->
  <ellipse cx="325" cy="80" rx="120" ry="40" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
  <text x="325" y="85" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Remote Repository</text>
  <text x="325" y="100" font-family="Arial, sans-serif" font-size="10" fill="#e8daef" text-anchor="middle">(GitHub)</text>
  
  <!-- Arrow down -->
  <line x1="290" y1="120" x2="290" y2="145" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="290,155 285,145 295,145" fill="#7f8c8d"/>
  <text x="260" y="140" font-family="monospace" font-size="10" fill="#27ae60">clone/pull</text>
  
  <!-- Local Repository -->
  <rect x="225" y="160" width="200" height="50" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="5"/>
  <text x="325" y="190" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Local Repository</text>
  
  <!-- Arrow up from local to remote -->
  <line x1="360" y1="155" x2="360" y2="130" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="360,120 355,130 365,130" fill="#7f8c8d"/>
  <text x="380" y="145" font-family="monospace" font-size="10" fill="#e74c3c">push</text>
  
  <!-- Arrow down -->
  <line x1="290" y1="210" x2="290" y2="235" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="290,245 285,235 295,235" fill="#7f8c8d"/>
  
  <!-- Staging Area -->
  <rect x="225" y="250" width="200" height="40" fill="#f39c12" stroke="#d68910" stroke-width="2" rx="5"/>
  <text x="325" y="275" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Staging Area</text>
  
  <!-- Arrow up from staging to local -->
  <line x1="360" y1="245" x2="360" y2="220" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="360,210 355,220 365,220" fill="#7f8c8d"/>
  <text x="380" y="235" font-family="monospace" font-size="10" fill="#e74c3c">commit</text>
  
  <!-- Arrow down -->
  <line x1="290" y1="290" x2="290" y2="310" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="290,320 285,310 295,310" fill="#7f8c8d"/>
  
  <!-- Working Directory -->
  <rect x="225" y="325" width="200" height="40" fill="#27ae60" stroke="#1e8449" stroke-width="2" rx="5"/>
  <text x="325" y="350" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Working Directory</text>
  
  <!-- Arrow up from working to staging -->
  <line x1="360" y1="320" x2="360" y2="295" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="360,290 355,300 365,300" fill="#7f8c8d"/>
  <text x="380" y="310" font-family="monospace" font-size="10" fill="#e74c3c">add</text>
  
  <!-- Labels on left -->
  <text x="55" y="85" font-family="Arial, sans-serif" font-size="11" fill="#9b59b6" text-anchor="start">Shared with team</text>
  <text x="55" y="190" font-family="Arial, sans-serif" font-size="11" fill="#3498db" text-anchor="start">Your full history</text>
  <text x="55" y="275" font-family="Arial, sans-serif" font-size="11" fill="#f39c12" text-anchor="start">Ready to commit</text>
  <text x="55" y="350" font-family="Arial, sans-serif" font-size="11" fill="#27ae60" text-anchor="start">Your edits</text>
</svg>
