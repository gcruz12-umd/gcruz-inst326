<svg width="500" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="250" y="25" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">How Python Resolves: a + b</text>

  <!-- Step 1 -->
  <rect x="50" y="50" width="200" height="50" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="5"/>
  <text x="150" y="70" font-family="monospace" font-size="13" fill="white" text-anchor="middle">a.__add__(b)</text>
  <text x="150" y="88" font-family="Arial, sans-serif" font-size="11" fill="#ebf5fb" text-anchor="middle">Step 1: Try left operand</text>

  <!-- Result arrow from Step 1 -->
  <line x1="250" y1="75" x2="310" y2="75" stroke="#27ae60" stroke-width="2"/>
  <polygon points="310,75 300,70 300,80" fill="#27ae60"/>
  <text x="380" y="70" font-family="Arial, sans-serif" font-size="12" fill="#27ae60" text-anchor="middle">Returns value?</text>
  <text x="380" y="86" font-family="Arial, sans-serif" font-size="13" fill="#27ae60" text-anchor="middle" font-weight="bold">Done!</text>

  <!-- Fallback arrow -->
  <line x1="150" y1="100" x2="150" y2="130" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="150,130 145,120 155,120" fill="#7f8c8d"/>
  <text x="215" y="120" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">NotImplemented</text>

  <!-- Step 2 -->
  <rect x="50" y="135" width="200" height="50" fill="#f39c12" stroke="#d68910" stroke-width="2" rx="5"/>
  <text x="150" y="155" font-family="monospace" font-size="13" fill="white" text-anchor="middle">b.__radd__(a)</text>
  <text x="150" y="173" font-family="Arial, sans-serif" font-size="11" fill="#fdebd0" text-anchor="middle">Step 2: Try right operand</text>

  <!-- Result arrow from Step 2 -->
  <line x1="250" y1="160" x2="310" y2="160" stroke="#27ae60" stroke-width="2"/>
  <polygon points="310,160 300,155 300,165" fill="#27ae60"/>
  <text x="380" y="155" font-family="Arial, sans-serif" font-size="12" fill="#27ae60" text-anchor="middle">Returns value?</text>
  <text x="380" y="171" font-family="Arial, sans-serif" font-size="13" fill="#27ae60" text-anchor="middle" font-weight="bold">Done!</text>

  <!-- Fallback arrow -->
  <line x1="150" y1="185" x2="150" y2="215" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="150,215 145,205 155,205" fill="#7f8c8d"/>
  <text x="215" y="205" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">NotImplemented</text>

  <!-- Step 3 -->
  <rect x="50" y="220" width="200" height="50" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="5"/>
  <text x="150" y="245" font-family="monospace" font-size="14" fill="white" text-anchor="middle" font-weight="bold">TypeError</text>
  <text x="150" y="260" font-family="Arial, sans-serif" font-size="11" fill="#fadbd8" text-anchor="middle">Step 3: Neither side handles it</text>

  <!-- Explanation box -->
  <rect x="270" y="225" width="210" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
  <text x="375" y="243" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">Python tries both sides</text>
  <text x="375" y="258" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">before raising an error</text>
</svg>
