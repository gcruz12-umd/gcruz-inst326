<svg width="500" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="250" y="25" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">How Decorators Work</text>

  <!-- Original function box -->
  <rect x="25" y="55" width="150" height="70" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="5"/>
  <text x="100" y="80" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Original Function</text>
  <text x="100" y="105" font-family="monospace" font-size="12" fill="#ebf5fb" text-anchor="middle">process(data)</text>

  <!-- Arrow with decorator label -->
  <line x1="175" y1="90" x2="230" y2="90" stroke="#9b59b6" stroke-width="3"/>
  <polygon points="230,90 220,84 220,96" fill="#9b59b6"/>
  <text x="203" y="78" font-family="monospace" font-size="13" fill="#9b59b6" text-anchor="middle" font-weight="bold">@timer</text>

  <!-- Wrapped function - outer box -->
  <rect x="240" y="42" width="235" height="108" fill="#27ae60" stroke="#1e8449" stroke-width="2" rx="5"/>
  <text x="357" y="62" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Wrapped Function</text>
  <text x="357" y="82" font-family="monospace" font-size="10" fill="#d5f5e3" text-anchor="middle">start = time.time()</text>

  <!-- Original inside -->
  <rect x="265" y="90" width="150" height="28" fill="#3498db" stroke="#2980b9" stroke-width="1.5" rx="3"/>
  <text x="340" y="109" font-family="monospace" font-size="11" fill="white" text-anchor="middle">process(data)</text>

  <text x="357" y="137" font-family="monospace" font-size="10" fill="#d5f5e3" text-anchor="middle">print(f"took {elapsed}s")</text>

  <!-- Equivalence box -->
  <rect x="40" y="185" width="420" height="95" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
  <text x="250" y="208" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">The @ syntax is syntactic sugar:</text>

  <text x="130" y="238" font-family="monospace" font-size="12" fill="#9b59b6" text-anchor="middle">@timer</text>
  <text x="130" y="256" font-family="monospace" font-size="12" fill="#9b59b6" text-anchor="middle">def process(): ...</text>

  <text x="250" y="248" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d" text-anchor="middle">=</text>

  <text x="375" y="248" font-family="monospace" font-size="12" fill="#9b59b6" text-anchor="middle">process = timer(process)</text>
</svg>
