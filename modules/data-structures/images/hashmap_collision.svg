<svg width="550" height="240" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="275" y="25" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">Collision: Two Keys in Same Bucket</text>
  
  <!-- Index labels -->
  <text x="50" y="85" font-family="monospace" font-size="14" fill="#7f8c8d">Index 0:</text>
  <text x="50" y="130" font-family="monospace" font-size="14" fill="#7f8c8d">Index 1:</text>
  <text x="50" y="175" font-family="monospace" font-size="14" fill="#7f8c8d">Index 2:</text>
  
  <!-- Bucket 0 with cherry -->
  <rect x="130" y="65" width="400" height="30" fill="#e8f6f3" stroke="#1abc9c" stroke-width="2" rx="5"/>
  <text x="145" y="85" font-family="monospace" font-size="13" fill="#2c3e50">[("cherry", 30)]</text>
  
  <!-- Bucket 1 with COLLISION - apple AND date -->
  <rect x="130" y="110" width="400" height="30" fill="#fadbd8" stroke="#e74c3c" stroke-width="3" rx="5"/>
  <text x="145" y="130" font-family="monospace" font-size="13" fill="#c0392b" font-weight="bold">[("apple", 10), ("date", 40)]</text>
  <!-- Collision indicator -->
  <text x="540" y="130" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">COLLISION!</text>
  
  <!-- Bucket 2 with banana -->
  <rect x="130" y="155" width="400" height="30" fill="#fef9e7" stroke="#f1c40f" stroke-width="2" rx="5"/>
  <text x="145" y="175" font-family="monospace" font-size="13" fill="#2c3e50">[("banana", 20)]</text>
  
  <!-- Explanation -->
  <text x="275" y="210" font-family="monospace" font-size="11" fill="#7f8c8d" text-anchor="middle">hash("apple") % 3 = 1    AND    hash("date") % 3 = 1</text>
  <text x="275" y="230" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle">Both keys hash to the same index - stored in same bucket (chaining)</text>
</svg>
