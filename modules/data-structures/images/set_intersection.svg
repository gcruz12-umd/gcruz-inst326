<svg width="350" height="180" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle A outline -->
  <circle cx="120" cy="95" r="70" fill="none" stroke="#bdc3c7" stroke-width="3"/>
  <!-- Circle B outline -->
  <circle cx="230" cy="95" r="70" fill="none" stroke="#bdc3c7" stroke-width="3"/>
  <!-- Intersection highlight using clip path -->
  <defs>
    <clipPath id="clipA">
      <circle cx="120" cy="95" r="70"/>
    </clipPath>
  </defs>
  <circle cx="230" cy="95" r="70" fill="#27ae60" fill-opacity="0.7" clip-path="url(#clipA)"/>
  <!-- Labels -->
  <text x="70" y="60" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" font-weight="bold">A</text>
  <text x="270" y="60" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" font-weight="bold">B</text>
  <!-- Values in A only -->
  <text x="70" y="95" font-family="Arial, sans-serif" font-size="16" fill="#95a5a6">1, 2</text>
  <!-- Values in both (highlighted) -->
  <text x="160" y="95" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="bold">3, 4</text>
  <!-- Values in B only -->
  <text x="255" y="95" font-family="Arial, sans-serif" font-size="16" fill="#95a5a6">5, 6</text>
  <!-- Title -->
  <text x="175" y="25" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle" font-weight="bold">Intersection: A &amp; B = {3, 4}</text>
</svg>
