<svg width="550" height="280" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="275" y="25" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">Looking Up "date" in Hash Table</text>
  
  <!-- Step 1 -->
  <rect x="20" y="45" width="510" height="35" fill="#ebf5fb" stroke="#3498db" stroke-width="2" rx="5"/>
  <text x="30" y="68" font-family="Arial, sans-serif" font-size="14" fill="#2980b9" font-weight="bold">Step 1:</text>
  <text x="90" y="68" font-family="monospace" font-size="13" fill="#2c3e50">hash("date") % 3 = 1  →  Go to bucket index 1</text>
  
  <!-- Step 2 -->
  <rect x="20" y="90" width="510" height="35" fill="#e8f8f5" stroke="#1abc9c" stroke-width="2" rx="5"/>
  <text x="30" y="113" font-family="Arial, sans-serif" font-size="14" fill="#16a085" font-weight="bold">Step 2:</text>
  <text x="90" y="113" font-family="monospace" font-size="13" fill="#2c3e50">Search bucket: [("apple", 10), ("date", 40)]</text>
  
  <!-- Step 3 -->
  <rect x="20" y="135" width="510" height="35" fill="#fef9e7" stroke="#f39c12" stroke-width="2" rx="5"/>
  <text x="30" y="158" font-family="Arial, sans-serif" font-size="14" fill="#d68910" font-weight="bold">Step 3:</text>
  <text x="90" y="158" font-family="monospace" font-size="13" fill="#2c3e50">Check "apple" != "date", continue...</text>
  
  <!-- Step 4 -->
  <rect x="20" y="180" width="510" height="35" fill="#eafaf1" stroke="#27ae60" stroke-width="2" rx="5"/>
  <text x="30" y="203" font-family="Arial, sans-serif" font-size="14" fill="#229954" font-weight="bold">Step 4:</text>
  <text x="90" y="203" font-family="monospace" font-size="13" fill="#27ae60" font-weight="bold">Found "date" == "date"!  Return 40</text>
  
  <!-- Visual representation of bucket -->
  <text x="50" y="245" font-family="monospace" font-size="14" fill="#7f8c8d">Bucket 1:</text>
  <rect x="130" y="225" width="130" height="30" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="2" rx="3"/>
  <text x="140" y="245" font-family="monospace" font-size="11" fill="#7f8c8d">("apple", 10)</text>
  <!-- Arrow -->
  <text x="265" y="245" font-family="Arial" font-size="16" fill="#7f8c8d">→</text>
  <rect x="280" y="225" width="130" height="30" fill="#d5f5e3" stroke="#27ae60" stroke-width="3" rx="3"/>
  <text x="290" y="245" font-family="monospace" font-size="11" fill="#27ae60" font-weight="bold">("date", 40)</text>
  <text x="420" y="245" font-family="Arial" font-size="14" fill="#27ae60" font-weight="bold">✓ FOUND</text>
</svg>
