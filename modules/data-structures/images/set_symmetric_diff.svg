<svg width="350" height="180" xmlns="http://www.w3.org/2000/svg">
  <!-- Both circles filled -->
  <circle cx="120" cy="95" r="70" fill="#9b59b6" fill-opacity="0.6" stroke="#8e44ad" stroke-width="3"/>
  <circle cx="230" cy="95" r="70" fill="#9b59b6" fill-opacity="0.6" stroke="#8e44ad" stroke-width="3"/>
  <!-- White out the intersection -->
  <defs>
    <clipPath id="clipSymA">
      <circle cx="120" cy="95" r="70"/>
    </clipPath>
  </defs>
  <circle cx="230" cy="95" r="70" fill="#ffffff" clip-path="url(#clipSymA)"/>
  <!-- Labels -->
  <text x="70" y="60" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" font-weight="bold">A</text>
  <text x="270" y="60" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" font-weight="bold">B</text>
  <!-- Values in A only (highlighted) -->
  <text x="70" y="95" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="bold">1, 2</text>
  <!-- Values in both (grayed - excluded) -->
  <text x="160" y="95" font-family="Arial, sans-serif" font-size="16" fill="#bdc3c7">3, 4</text>
  <!-- Values in B only (highlighted) -->
  <text x="255" y="95" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="bold">5, 6</text>
  <!-- Title -->
  <text x="175" y="25" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle" font-weight="bold">Symmetric Diff: A ^ B = {1,2,5,6}</text>
</svg>
