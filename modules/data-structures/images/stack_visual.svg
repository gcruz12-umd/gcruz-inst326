<svg width="450" height="280" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="225" y="25" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">Stack: Last In, First Out (LIFO)</text>
  
  <!-- Stack container -->
  <rect x="150" y="50" width="150" height="180" fill="none" stroke="#34495e" stroke-width="3" rx="5"/>
  
  <!-- Stack items -->
  <rect x="160" y="180" width="130" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="3"/>
  <text x="225" y="205" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">"first"</text>
  
  <rect x="160" y="135" width="130" height="40" fill="#2ecc71" stroke="#27ae60" stroke-width="2" rx="3"/>
  <text x="225" y="160" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">"second"</text>
  
  <rect x="160" y="90" width="130" height="40" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="3"/>
  <text x="225" y="115" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">"third"</text>
  
  <!-- TOP indicator -->
  <text x="320" y="115" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c" font-weight="bold">← TOP</text>
  <text x="320" y="135" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">(pop here)</text>
  
  <!-- BOTTOM indicator -->
  <text x="320" y="205" font-family="Arial, sans-serif" font-size="14" fill="#3498db" font-weight="bold">← BOTTOM</text>
  <text x="320" y="225" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">(first in)</text>
  
  <!-- Operations -->
  <text x="80" y="90" font-family="monospace" font-size="12" fill="#27ae60" text-anchor="end">append()</text>
  <text x="80" y="105" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="end">push ↓</text>
  
  <text x="80" y="130" font-family="monospace" font-size="12" fill="#e74c3c" text-anchor="end">pop()</text>
  <text x="80" y="145" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="end">↑ remove</text>
  
  <!-- Key insight -->
  <text x="225" y="260" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle">"third" was added last, removed first</text>
</svg>
