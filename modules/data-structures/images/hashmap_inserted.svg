<svg width="500" height="220" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="250" y="25" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">Hash Table After Insertions</text>
  
  <!-- Index labels -->
  <text x="50" y="75" font-family="monospace" font-size="14" fill="#7f8c8d">Index 0:</text>
  <text x="50" y="115" font-family="monospace" font-size="14" fill="#7f8c8d">Index 1:</text>
  <text x="50" y="155" font-family="monospace" font-size="14" fill="#7f8c8d">Index 2:</text>
  
  <!-- Bucket 0 with cherry -->
  <rect x="130" y="55" width="350" height="30" fill="#e8f6f3" stroke="#1abc9c" stroke-width="2" rx="5"/>
  <text x="145" y="75" font-family="monospace" font-size="13" fill="#2c3e50">[("cherry", 30)]</text>
  
  <!-- Bucket 1 with apple -->
  <rect x="130" y="95" width="350" height="30" fill="#ebf5fb" stroke="#3498db" stroke-width="2" rx="5"/>
  <text x="145" y="115" font-family="monospace" font-size="13" fill="#2c3e50">[("apple", 10)]</text>
  
  <!-- Bucket 2 with banana -->
  <rect x="130" y="135" width="350" height="30" fill="#fef9e7" stroke="#f1c40f" stroke-width="2" rx="5"/>
  <text x="145" y="155" font-family="monospace" font-size="13" fill="#2c3e50">[("banana", 20)]</text>
  
  <!-- Hash calculations -->
  <text x="250" y="190" font-family="monospace" font-size="11" fill="#7f8c8d" text-anchor="middle">hash("cherry") % 3 = 0    hash("apple") % 3 = 1    hash("banana") % 3 = 2</text>
</svg>
